name: Sync with Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync fork
        run: |
          git remote add upstream https://github.com/topchyan/abcarus.git
          git fetch upstream
          DEFAULT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git merge upstream/$DEFAULT_BRANCH --ff-only || git merge upstream/$DEFAULT_BRANCH --no-edit
          git push origin $DEFAULT_BRANCH
